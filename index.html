<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Simple Header -->
        <header class="header">
            <h1>Enjoy your playlist</h1>
            <nav> 
                <a href="index.html" class="active">home</a>
                <a href="music.html">music</a>
                <a href="videos.html">videos</a>
                <a href="photos.html">photos</a>
            </nav>
        </header>

        <!-- Main Content -->
        <main>
            <h2>your library</h2>
            
            <div class="grid">
                <a href="music.html" class="card music">
                    <h3>music</h3>
                    <p>3 songs</p>
                </a>
                <a href="videos.html" class="card videos">
                    <h3>videos</h3>
                    <p>3 videos</p>
                </a>
                <a href="photos.html" class="card photos">
                    <h3>photos</h3>
                    <p>3 photos</p>
                </a>
            </div>
        </main>

        <!-- Simple Player Bar -->
        <div class="player-bar">
            <span id="nowPlaying">not playing</span>
            <div>
                <button id="playPause">▶</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
